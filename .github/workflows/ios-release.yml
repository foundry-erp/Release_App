name: iOS App Store Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build IPA only, skip TestFlight upload'
        required: true
        default: true
        type: boolean
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.24.5'
        type: string
      app_version:
        description: 'App marketing version (CFBundleShortVersionString)'
        required: false
        default: '3.0.0'
        type: string
      build_number:
        description: 'Build number (CFBundleVersion) — leave empty to use run number'
        required: false
        default: ''
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./foundry-app/flutter

jobs:
  ios-release:
    name: Build & Deploy Foundry Position iOS
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        timeout-minutes: 5
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Flutter version check
        run: |
          flutter --version
          echo "Dart SDK: $(dart --version)"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ./foundry-app/flutter/ios
        run: |
          for attempt in 1 2 3; do
            echo "CocoaPods install attempt $attempt..."
            pod install --repo-update && break
            if [ $attempt -lt 3 ]; then
              echo "::warning::CocoaPods CDN failed (attempt $attempt/3), retrying in 30s..."
              sleep 30
            else
              echo "::error::CocoaPods install failed after 3 attempts"
              exit 1
            fi
          done
          echo "CocoaPods installation complete"

      - name: Configure Firebase (GoogleService-Info.plist)
        run: |
          # The submodule ships a valid GoogleService-Info.plist.
          # Only overwrite if the secret is set and decodes to a valid plist.
          if [ -n "${{ secrets.FOUNDRY_APP_IOS_GOOGLE_SERVICE_INFO }}" ]; then
            echo "${{ secrets.FOUNDRY_APP_IOS_GOOGLE_SERVICE_INFO }}" | base64 --decode > /tmp/gsi_candidate.plist
            if /usr/libexec/PlistBuddy -c "Print GOOGLE_APP_ID" /tmp/gsi_candidate.plist > /dev/null 2>&1; then
              cp /tmp/gsi_candidate.plist ios/Runner/GoogleService-Info.plist
              echo "Firebase config overwritten from secret"
            else
              echo "::warning::Secret plist missing GOOGLE_APP_ID — keeping repo version"
            fi
            rm -f /tmp/gsi_candidate.plist
          else
            echo "No secret set — using repo GoogleService-Info.plist"
          fi
          # Verify final plist
          echo "GoogleService-Info.plist contents:"
          /usr/libexec/PlistBuddy -c "Print GOOGLE_APP_ID" ios/Runner/GoogleService-Info.plist
          /usr/libexec/PlistBuddy -c "Print BUNDLE_ID" ios/Runner/GoogleService-Info.plist
          /usr/libexec/PlistBuddy -c "Print PROJECT_ID" ios/Runner/GoogleService-Info.plist

      - name: Create .env file
        run: |
          echo "API_BASE_URL=${{ secrets.FOUNDRY_APP_API_BASE_URL }}" > .env
          echo ".env file created"

      - name: Setup Keychain for code signing
        run: |
          KEYCHAIN_PASSWORD="${{ secrets.AIKYAT_RUNNER_KEYCHAIN_PASSWORD }}"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain
          # Add build.keychain to the search list (critical for codesign to find certs)
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          echo "Keychain created and added to search list"

      - name: Install Apple WWDR certificates
        run: |
          # Apple intermediate certs needed for provisioning profile CMS verification
          curl -sL -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sL -o /tmp/AppleRootCA-G3.cer https://www.apple.com/certificateauthority/AppleRootCA-G3.cer
          curl -sL -o /tmp/AppleWWDRCA.cer https://developer.apple.com/certificationauthority/AppleWWDRCA.cer
          security import /tmp/AppleWWDRCAG3.cer -k build.keychain -T /usr/bin/codesign
          security import /tmp/AppleRootCA-G3.cer -k build.keychain -T /usr/bin/codesign
          security import /tmp/AppleWWDRCA.cer -k build.keychain -T /usr/bin/codesign
          rm -f /tmp/Apple*.cer
          echo "Apple WWDR intermediate certificates installed"

      - name: Import signing certificate (P12)
        run: |
          echo "${{ secrets.AIKYAT_FLUTTER_RELEASE_IOS_SIGNING_CERT }}" | base64 --decode > /tmp/dist_cert.p12
          if [ ! -s /tmp/dist_cert.p12 ]; then
            echo "::error::Signing certificate decode failed"
            exit 1
          fi
          security import /tmp/dist_cert.p12 \
            -k build.keychain \
            -P "${{ secrets.AIKYAT_FLUTTER_RELEASE_IOS_SIGNING_CERT_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${{ secrets.AIKYAT_RUNNER_KEYCHAIN_PASSWORD }}" \
            build.keychain
          rm -f /tmp/dist_cert.p12
          echo "Distribution certificate imported"
          echo "Available signing identities:"
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        id: profile
        env:
          PROFILE_B64: ${{ secrets.AIKYAT_FLUTTER_RELEASE_IOS_PROVISIONING_PROFILE }}
        run: |
          # Write base64 to file, strip ALL whitespace, then decode
          echo "$PROFILE_B64" > /tmp/profile.b64
          tr -d '\n\r\t ' < /tmp/profile.b64 > /tmp/profile_clean.b64
          B64_SIZE=$(wc -c < /tmp/profile_clean.b64 | tr -d ' ')
          echo "Base64 size: ${B64_SIZE} chars"
          base64 -D -i /tmp/profile_clean.b64 -o /tmp/profile.mobileprovision
          FILE_SIZE=$(wc -c < /tmp/profile.mobileprovision | tr -d ' ')
          echo "Profile binary size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "::error::Provisioning profile too small (${FILE_SIZE} bytes)"
            exit 1
          fi
          # Verify CMS signature is valid
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile_plist.xml 2>&1
          CMS_EXIT=$?
          echo "CMS decode exit code: ${CMS_EXIT}"
          if [ $CMS_EXIT -ne 0 ]; then
            echo "::error::CMS signature verification failed"
            exit 1
          fi
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile_plist.xml)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile_plist.xml)
          echo "Profile UUID: ${PROFILE_UUID}"
          echo "Profile Name: ${PROFILE_NAME}"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          # Verify installed file matches original
          INSTALLED_MD5=$(md5 -q "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision")
          ORIGINAL_MD5=$(md5 -q /tmp/profile.mobileprovision)
          echo "MD5 match: original=${ORIGINAL_MD5} installed=${INSTALLED_MD5}"
          rm -f /tmp/profile.b64 /tmp/profile_clean.b64 /tmp/profile.mobileprovision /tmp/profile_plist.xml
          echo "profile_uuid=${PROFILE_UUID}" >> $GITHUB_OUTPUT
          echo "profile_name=${PROFILE_NAME}" >> $GITHUB_OUTPUT

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_KEY }}" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_KEY_ID }}.p8
          if [ ! -s ~/.private_keys/AuthKey_${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_KEY_ID }}.p8 ]; then
            echo "::error::ASC API Key decode failed"
            exit 1
          fi
          chmod 600 ~/.private_keys/AuthKey_${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_KEY_ID }}.p8
          echo "App Store Connect API key configured"

      - name: Write ExportOptions.plist for manual signing
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>${{ secrets.AIKYAT_FLUTTER_RELEASE_APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.AIKYAT_FLUTTER_RELEASE_IOS_BUNDLE_ID }}</key>
              <string>${{ steps.profile.outputs.profile_name }}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          echo "ExportOptions.plist configured for manual signing"
          cat ios/ExportOptions.plist

      - name: Build Flutter iOS (no codesign)
        run: |
          BUILD_NUM="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUM" ]; then
            BUILD_NUM="${{ github.run_number }}"
          fi
          echo "Building version ${{ inputs.app_version }}+${BUILD_NUM}"
          flutter build ios \
            --release \
            --build-name="${{ inputs.app_version }}" \
            --build-number="${BUILD_NUM}" \
            --obfuscate \
            --split-debug-info=build/debug-info/ios \
            --tree-shake-icons \
            --no-codesign

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*

      - name: Archive without signing
        run: |
          # Archive with signing disabled — bypasses DVTProvisioningProfileManager
          # ExportArchive step handles all signing via ExportOptions.plist
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="${{ secrets.AIKYAT_FLUTTER_RELEASE_APPLE_TEAM_ID }}"
          echo "Archive complete (unsigned)"

      - name: Patch App.framework MinimumOSVersion
        run: |
          # Flutter's App.framework may lack MinimumOSVersion in its Info.plist,
          # causing App Store validation to reject the upload.
          # Must patch AFTER archive (which rebuilds from source) but BEFORE export.
          ARCHIVE_APP="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          APP_FW="$ARCHIVE_APP/Frameworks/App.framework/Info.plist"
          if [ -f "$APP_FW" ]; then
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 16.0" "$APP_FW" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 16.0" "$APP_FW"
            echo "Patched App.framework MinimumOSVersion to 16.0"
            /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_FW"
          else
            echo "::warning::App.framework Info.plist not found at expected path, searching..."
            find build/ios/archive -name "Info.plist" -path "*/App.framework/*" 2>/dev/null
          fi

      - name: Verify GoogleService-Info.plist in archive
        run: |
          ARCHIVE_APP="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          GSI="$ARCHIVE_APP/GoogleService-Info.plist"
          if [ -f "$GSI" ]; then
            echo "GoogleService-Info.plist found in archive bundle"
            /usr/libexec/PlistBuddy -c "Print GOOGLE_APP_ID" "$GSI"
          else
            echo "::warning::GoogleService-Info.plist NOT in archive bundle — searching..."
            find build/ios/archive -name "GoogleService-Info.plist" 2>/dev/null
          fi

      - name: Export and sign IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates
          echo "IPA exported and signed"

      - name: Validate IPA
        id: validate
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          if [ -n "$IPA_PATH" ]; then
            SIZE=$(ls -lh "$IPA_PATH" | awk '{print $5}')
            echo "ipa_path=${IPA_PATH}" >> $GITHUB_OUTPUT
            echo "### ✅ IPA Built Successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **File:** \`${IPA_PATH}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Size:** ${SIZE}" >> $GITHUB_STEP_SUMMARY
            echo "IPA found: ${IPA_PATH} (${SIZE})"
          else
            echo "::error::No IPA file found in build/ios/ipa/"
            ls -laR build/ios/ 2>/dev/null || echo "build/ios/ not found"
            exit 1
          fi

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-position-ios-${{ github.run_number }}
          path: foundry-app/flutter/build/ios/ipa/*.ipa
          retention-days: 14

      - name: Upload debug symbols as artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-position-dsyms-${{ github.run_number }}
          path: foundry-app/flutter/build/debug-info/ios/
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "Uploading to TestFlight..."
          UPLOAD_LOG=$(mktemp)
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.validate.outputs.ipa_path }}" \
            --apiKey "${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.AIKYAT_FLUTTER_RELEASE_ASC_ISSUER_ID }}" 2>&1 | tee "$UPLOAD_LOG"
          # altool can exit 0 even on server-side validation failure — check output
          if grep -qi "UPLOAD FAILED\|Failed to upload\|ERROR:" "$UPLOAD_LOG"; then
            echo "::error::TestFlight upload failed — see log above"
            rm -f "$UPLOAD_LOG"
            exit 1
          fi
          rm -f "$UPLOAD_LOG"
          echo "### Uploaded to TestFlight" >> $GITHUB_STEP_SUMMARY

      - name: Dry run notice
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "### 🧪 Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "IPA built successfully and uploaded as workflow artifact." >> $GITHUB_STEP_SUMMARY
          echo "To deploy to TestFlight, re-run this workflow with **dry_run = false**." >> $GITHUB_STEP_SUMMARY

      - name: Workflow summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**App:** Foundry Position" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle ID:** ${{ secrets.AIKYAT_FLUTTER_RELEASE_IOS_BUNDLE_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Team:** ${{ secrets.AIKYAT_FLUTTER_RELEASE_APPLE_TEAM_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.app_version }}+${{ inputs.build_number || github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Flutter:** ${{ inputs.flutter_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
